configuration:
  board_version:
    name: Board-Version Profil
    description: Waehle das Hardware-Profil deines reComputer R1000.
  strict_profile_validation:
    name: Strikte Profil-Validierung
    description: Wenn aktiv, werden fehlende UARTs des Profils als Fehler protokolliert.
  boot_partition_override:
    name: Boot-Partition Override
    description: Optionaler manueller Pfad zur Boot-Partition, z. B. /dev/nvme0n1p1 oder /dev/mmcblk0p1.
  emit_homeassistant_config_snippet:
    name: Home-Assistant Config-Snippet ausgeben
    description: Schreibt und protokolliert einen kopierfertigen Home-Assistant MQTT-YAML-Block fuer LED- und Buzzer-Entities.
  mqtt_host:
    name: MQTT-Host
    description: Hostname des MQTT-Brokers, z. B. core-mosquitto.
  mqtt_port:
    name: MQTT-Port
    description: TCP-Port des MQTT-Brokers.
  mqtt_username:
    name: MQTT-Benutzername
    description: Optionaler MQTT-Benutzername.
  mqtt_password:
    name: MQTT-Passwort
    description: Optionales MQTT-Passwort.
  mqtt_topic_prefix:
    name: MQTT-Topic-Prefix
    description: Basis-Topic fuer LED- und Buzzer-Status sowie Befehle.
  mqtt_discovery_prefix:
    name: MQTT-Discovery-Prefix
    description: Home-Assistant MQTT-Discovery-Prefix, normalerweise homeassistant.
  mqtt_enable_discovery:
    name: MQTT-Discovery aktivieren
    description: Veröffentlicht Home-Assistant MQTT-Discovery-Konfiguration automatisch.
  mqtt_auto_anonymous_fallback:
    name: Automatischer anonymer Fallback
    description: Wenn Login mit Zugangsdaten fehlschlaegt, wird einmal ohne Benutzername/Passwort erneut verbunden.
  enable_rs485:
    name: RS485-Pruefung aktivieren
    description: Prueft und repariert die RS485-Boot-Konfiguration.
  enable_rs485_de_control:
    name: RS485 DE/RE GPIO-Steuerung aktivieren
    description: Nur fuer v1.0: setzt DE/RE GPIOs in jedem Zyklus auf low.
  enable_led_check:
    name: LED-Pruefung aktivieren
    description: Prueft die USER-LED Device-Dateien.
  led_self_test:
    name: LED-Selbsttest
    description: Schaltet die USER-LEDs in jedem Zyklus kurz um.
  enable_buzzer_check:
    name: Buzzer-Pruefung aktivieren
    description: Prueft das Buzzer-GPIO passend zum Profil.
  buzzer_self_test:
    name: Buzzer-Selbsttest
    description: Gibt in jedem Zyklus einen kurzen Ton aus.
  check_interval_sec:
    name: Pruefintervall in Sekunden
    description: Pause zwischen den Verifikationszyklen.
